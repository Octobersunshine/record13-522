<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="示例 SPA 应用 - 用于测试预渲染功能">
  <title>关于我们 - 示例 SPA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 20px 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    nav { display: flex; gap: 8px; flex-wrap: wrap; }
    nav a {
      padding: 10px 20px;
      text-decoration: none;
      color: #555;
      border-radius: 8px;
      transition: all 0.3s;
      font-weight: 500;
    }
    nav a:hover, nav a.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    .content {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      min-height: 500px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h2 { font-size: 1.8rem; margin-bottom: 20px; color: #444; }
    p { line-height: 1.8; margin-bottom: 16px; color: #666; font-size: 1.05rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
      border-radius: 10px;
      padding: 25px;
      transition: transform 0.3s;
    }
    .card:hover { transform: translateY(-5px); }
    .card h3 { margin-bottom: 10px; color: #667eea; }
    .card p { margin-bottom: 0; font-size: 0.95rem; }
    .product-list { list-style: none; }
    .product-list li {
      padding: 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .product-list li:last-child { border-bottom: none; }
    .product-name { font-weight: 600; color: #444; }
    .product-price { color: #764ba2; font-weight: bold; font-size: 1.2rem; }
    .tag {
      display: inline-block;
      padding: 4px 12px;
      background: #e8ecf1;
      border-radius: 20px;
      font-size: 0.85rem;
      margin: 3px;
      color: #667eea;
    }
    footer {
      text-align: center;
      color: rgba(255,255,255,0.9);
      margin-top: 30px;
      padding: 20px;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      font-size: 1.2rem;
      color: #999;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e8ecf1;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .stat-box {
      background: linear-gradient(135deg, #667eea22, #764ba222);
      border-radius: 10px;
      padding: 25px;
      text-align: center;
    }
    .stat-number { font-size: 2.5rem; font-weight: bold; color: #667eea; }
    .stat-label { color: #666; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <nav>
        <a href="#/" data-route="/">首页</a>
        <a href="#/about" data-route="/about" class="active">关于我们</a>
        <a href="#/products" data-route="/products">产品列表</a>
        <a href="#/contact" data-route="/contact">联系方式</a>
      </nav>
    </header>

    <main class="content" id="app">
        <h1>关于我们</h1>
        <h2>我们的使命</h2>
        <p>我们致力于为开发者提供最优质的前端工具和服务，帮助团队构建高性能、易维护的 Web 应用。</p>
        <h2 style="margin-top: 30px;">团队成员</h2>
        <div class="grid">
          <div class="card">
            <h3>👨‍💻 张三</h3>
            <p>前端架构师，10 年开发经验，专注于性能优化和工程化。</p>
            <div style="margin-top: 15px;">
              <span class="tag">Vue</span>
              <span class="tag">React</span>
              <span class="tag">性能优化</span>
            </div>
          </div>
          <div class="card">
            <h3>👩‍💻 李四</h3>
            <p>全栈工程师，擅长 Node.js 服务端开发和 DevOps。</p>
            <div style="margin-top: 15px;">
              <span class="tag">Node.js</span>
              <span class="tag">Docker</span>
              <span class="tag">K8s</span>
            </div>
          </div>
          <div class="card">
            <h3>👨‍🎨 王五</h3>
            <p>UI/UX 设计师，注重用户体验和视觉美感。</p>
            <div style="margin-top: 15px;">
              <span class="tag">Figma</span>
              <span class="tag">交互设计</span>
              <span class="tag">动效</span>
            </div>
          </div>
        </div>
      </main>

    <footer>
      <p>© 2026 示例 SPA 应用 | 用于预渲染测试</p>
    </footer>
  </div>

  <script>
    const routes = {
      '/': () => `
        <h1>欢迎来到示例 SPA</h1>
        <p>这是一个用于测试 <strong>单页面应用预渲染</strong> 功能的示例项目。</p>
        <p>预渲染（Prerendering）是一种在构建时或运行时将 SPA 页面渲染为静态 HTML 的技术，可以显著提升 SEO 表现和首屏加载速度。</p>
        <div class="stats">
          <div class="stat-box">
            <div class="stat-number">99%</div>
            <div class="stat-label">SEO 友好度</div>
          </div>
          <div class="stat-box">
            <div class="stat-number">2x</div>
            <div class="stat-label">首屏速度提升</div>
          </div>
          <div class="stat-box">
            <div class="stat-number">0</div>
            <div class="stat-label">白屏时间</div>
          </div>
        </div>
        <h2 style="margin-top: 40px;">核心特性</h2>
        <div class="grid">
          <div class="card">
            <h3>🚀 极速渲染</h3>
            <p>使用 Puppeteer 无头浏览器，支持页面完全加载后再捕获内容。</p>
          </div>
          <div class="card">
            <h3>📦 静态输出</h3>
            <p>生成纯静态 HTML 文件，可直接部署到 CDN 或静态托管服务。</p>
          </div>
          <div class="card">
            <h3>🔍 SEO 优化</h3>
            <p>搜索引擎爬虫可直接读取完整内容，无需执行 JavaScript。</p>
          </div>
        </div>
      `,
      '/about': () => `
        <h1>关于我们</h1>
        <h2>我们的使命</h2>
        <p>我们致力于为开发者提供最优质的前端工具和服务，帮助团队构建高性能、易维护的 Web 应用。</p>
        <h2 style="margin-top: 30px;">团队成员</h2>
        <div class="grid">
          <div class="card">
            <h3>👨‍💻 张三</h3>
            <p>前端架构师，10 年开发经验，专注于性能优化和工程化。</p>
            <div style="margin-top: 15px;">
              <span class="tag">Vue</span>
              <span class="tag">React</span>
              <span class="tag">性能优化</span>
            </div>
          </div>
          <div class="card">
            <h3>👩‍💻 李四</h3>
            <p>全栈工程师，擅长 Node.js 服务端开发和 DevOps。</p>
            <div style="margin-top: 15px;">
              <span class="tag">Node.js</span>
              <span class="tag">Docker</span>
              <span class="tag">K8s</span>
            </div>
          </div>
          <div class="card">
            <h3>👨‍🎨 王五</h3>
            <p>UI/UX 设计师，注重用户体验和视觉美感。</p>
            <div style="margin-top: 15px;">
              <span class="tag">Figma</span>
              <span class="tag">交互设计</span>
              <span class="tag">动效</span>
            </div>
          </div>
        </div>
      `,
      '/products': () => {
        const products = [
          { id: 1, name: '企业级管理后台', price: '¥9,999' },
          { id: 2, name: '电商平台系统', price: '¥19,999' },
          { id: 3, name: '移动端 App 开发', price: '¥29,999' },
          { id: 4, name: '数据可视化大屏', price: '¥15,999' },
          { id: 5, name: '微服务架构咨询', price: '¥5,000/天' },
          { id: 6, name: 'SEO 优化服务', price: '¥3,999' }
        ];
        return `
          <h1>产品列表</h1>
          <p>我们提供全方位的软件解决方案，满足不同规模企业的需求。</p>
          <h2 style="margin-top: 30px;">热门产品</h2>
          <ul class="product-list">
            ${products.map(p => `
              <li>
                <div>
                  <div class="product-name">${p.id}. ${p.name}</div>
                  <div style="color: #888; font-size: 0.9rem; margin-top: 5px;">专业团队 · 快速交付 · 售后保障</div>
                </div>
                <div class="product-price">${p.price}</div>
              </li>
            `).join('')}
          </ul>
        `;
      },
      '/contact': () => `
        <h1>联系我们</h1>
        <p>如有任何问题或合作意向，欢迎随时与我们取得联系。</p>
        <div class="grid">
          <div class="card">
            <h3>📧 电子邮件</h3>
            <p>商务合作：business@example.com</p>
            <p>技术支持：support@example.com</p>
          </div>
          <div class="card">
            <h3>📞 电话</h3>
            <p>客服热线：400-123-4567</p>
            <p>工作时间：周一至周五 9:00-18:00</p>
          </div>
          <div class="card">
            <h3>📍 地址</h3>
            <p>北京市朝阳区科技园区 88 号</p>
            <p>创新大厦 A 座 2026 室</p>
          </div>
        </div>
        <h2 style="margin-top: 40px;">在线留言</h2>
        <p>您也可以直接在下方留言，我们会尽快回复您：</p>
        <div class="card" style="margin-top: 20px;">
          <p><strong>温馨提示：</strong>这是一个演示页面，表单提交功能暂未开放。</p>
          <p>请通过上述联系方式与我们取得联系。</p>
        </div>
      `,
      '/404': () => `
        <h1>404 - 页面未找到</h1>
        <p>抱歉，您访问的页面不存在。</p>
        <p>请检查 URL 是否正确，或点击导航栏返回首页。</p>
      `
    };

    function getRoute() {
      const hash = location.hash.slice(1) || '/';
      return hash;
    }

    function updateNavActive(route) {
      document.querySelectorAll('nav a').forEach(a => {
        const aRoute = a.getAttribute('data-route');
        a.classList.toggle('active', aRoute === route);
      });
    }

    function render() {
      const route = getRoute();
      const app = document.getElementById('app');
      const renderFn = routes[route] || routes['/404'];

      app.innerHTML = renderFn();
      updateNavActive(route);

      const titles = {
        '/': '示例 SPA - 首页',
        '/about': '关于我们 - 示例 SPA',
        '/products': '产品列表 - 示例 SPA',
        '/contact': '联系方式 - 示例 SPA',
        '/404': '页面未找到 - 示例 SPA'
      };
      document.title = titles[route] || titles['/'];

      window.__PRERENDER_READY__ = true;
    }

    window.addEventListener('hashchange', render);
    window.addEventListener('DOMContentLoaded', render);

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      setTimeout(render, 0);
    }
  </script>


</body></html>
